apiVersion: apps/v1
kind: Deployment
metadata:
  name: fibonacci-api
spec:
  replicas: 2
  template:
    spec:
      containers:
      - name: fibonacci-api
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        env:
        - name: WORKERS
          value: "3"
        - name: LOG_LEVEL
          value: "INFO"
        envFrom:
        - configMapRef:
            name: fibonacci-config

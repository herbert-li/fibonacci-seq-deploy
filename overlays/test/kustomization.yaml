apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: fibonacci-api-test

namespace: fibonacci-test

# Common labels for test environment
commonLabels:
  environment: test
  tier: testing

# Common annotations
commonAnnotations:
  environment: testing
  managed-by: argocd

# Base configuration
resources:
  - ../../base

# Patches for test environment
patchesStrategicMerge:
  - deployment-patch.yaml
  - hpa-patch.yaml
  - route-patch.yaml

# Image configuration for test
images:
  - name: fibonacci-api
    newName: docker.io/changeme/fibonacci-api
    newTag: test-latest

# ConfigMap generator for environment-specific config
configMapGenerator:
  - name: fibonacci-config
    literals:
      - ENVIRONMENT=testing
      - LOG_LEVEL=INFO

# Name prefix/suffix
nameSuffix: ""

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: fibonacci-api-dev

namespace: fibonacci-dev

# Common labels for dev environment
commonLabels:
  environment: dev
  tier: development

# Common annotations
commonAnnotations:
  environment: development
  managed-by: argocd

# Base configuration
resources:
  - ../../base

# Patches for dev environment
patchesStrategicMerge:
  - deployment-patch.yaml
  - hpa-patch.yaml
  - route-patch.yaml

# Image configuration for dev
images:
  - name: fibonacci-api
    newName: docker.io/linan0890/fibonacci-api
    newTag: dev

# ConfigMap generator for environment-specific config
configMapGenerator:
  - name: fibonacci-config
    literals:
      - ENVIRONMENT=development
      - LOG_LEVEL=DEBUG

# Name prefix/suffix
nameSuffix: ""

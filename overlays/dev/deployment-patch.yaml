apiVersion: apps/v1
kind: Deployment
metadata:
  name: fibonacci-api
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: fibonacci-api
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        env:
        - name: WORKERS
          value: "2"
        - name: LOG_LEVEL
          value: "DEBUG"
        envFrom:
        - configMapRef:
            name: fibonacci-config

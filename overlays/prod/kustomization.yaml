apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: fibonacci-api-prod

namespace: fibonacci-prod

# Common labels for prod environment
commonLabels:
  environment: prod
  tier: production

# Common annotations
commonAnnotations:
  environment: production
  managed-by: argocd

# Base configuration
resources:
  - ../../base

# Patches for prod environment
patchesStrategicMerge:
  - deployment-patch.yaml
  - hpa-patch.yaml
  - route-patch.yaml
  - pdb-patch.yaml

# Image configuration for prod
images:
  - name: fibonacci-api
    newName: docker.io/changeme/fibonacci-api
    newTag: prod-latest

# ConfigMap generator for environment-specific config
configMapGenerator:
  - name: fibonacci-config
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO

# Name prefix/suffix
nameSuffix: ""

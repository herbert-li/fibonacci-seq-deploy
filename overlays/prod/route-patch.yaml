apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: fibonacci-api
  annotations:
    # Production-specific route annotations
    haproxy.router.openshift.io/timeout: 120s
    haproxy.router.openshift.io/rate-limit-connections: "true"
    haproxy.router.openshift.io/rate-limit-connections.concurrent-tcp: "200"
    haproxy.router.openshift.io/rate-limit-connections.rate-tcp: "100"
    haproxy.router.openshift.io/balance: leastconn
spec:
  host: fibonacci.apps.cluster.example.com
